<body class="bg-background font-body text-on-background overflow-hidden h-screen w-screen relative">
<!-- Full Screen Map Container -->

<div class="absolute inset-0 map-gradient-overlay pointer-events-none"></div>
<!-- Real-time Markers -->
<div class="absolute top-1/3 left-1/4 -translate-x-1/2 -translate-y-1/2">
<div class="relative">
<div class="bg-surface-container-lowest p-2 rounded-full shadow-2xl border-2 border-primary-container">
<span class="material-symbols-outlined text-primary text-3xl">school</span>
</div>
<div class="absolute top-full left-1/2 -translate-x-1/2 mt-2 bg-brand-navy text-white text-[10px] font-bold px-2 py-1 rounded shadow-lg whitespace-nowrap">ST. MARY'S PRIMARY</div>
</div>
</div>
<!-- Bus Marker -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
<div class="relative flex items-center justify-center">
<div class="absolute w-20 h-20 bg-brand-navy/20 rounded-full animate-pulse scale-150"></div>
<div class="relative bg-brand-navy p-3 rounded-full shadow-[0_0_30px_rgba(11,28,48,0.4)] border-4 border-white">
<span class="material-symbols-outlined text-brand-yellow text-3xl" style="font-variation-settings: 'FILL' 1;">directions_bus</span>
</div>
</div>
</div>
<!-- Home Marker -->
<div class="absolute bottom-1/3 right-1/4 translate-x-1/2 translate-y-1/2">
<div class="bg-surface-container-lowest p-2 rounded-full shadow-2xl border-2 border-tertiary">
<span class="material-symbols-outlined text-tertiary text-3xl">home</span>
</div>
</div>
</div>
<!-- Floating UI Controls -->
<div class="relative z-10 flex flex-col h-full pointer-events-none">
<!-- Floating Header -->
<div class="flex justify-between items-center px-6 pt-12 w-full max-w-7xl mx-auto pointer-events-auto">
<div class="flex items-center gap-3">
<button class="w-12 h-12 flex items-center justify-center bg-white/90 backdrop-blur-md rounded-full shadow-lg active:scale-95 transition-all text-blue-700">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex items-center gap-2 bg-white/90 backdrop-blur-md pl-2 pr-4 py-2 rounded-full shadow-lg">

<h1 class="font-manrope font-bold text-blue-900 text-lg">ApoBasi</h1>
</div>
</div>
<div class="flex items-center gap-2 px-3 py-2 bg-brand-navy/90 backdrop-blur-md rounded-full shadow-lg border border-white/20">
<div class="w-2 h-2 rounded-full bg-brand-yellow animate-pulse"></div>
<span class="text-[10px] font-bold font-label tracking-widest uppercase text-white">Live</span>
</div>
</div>
<!-- Center Space -->
<div class="flex-grow"></div>
<!-- Right Side Overlay Buttons (Zoom/Layers) -->
<div class="p-6 flex flex-col items-end gap-3 pointer-events-auto">
<button class="w-12 h-12 flex items-center justify-center bg-white/90 backdrop-blur-md rounded-2xl shadow-xl active:scale-95 transition-all text-brand-navy">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
</button>
<button class="w-12 h-12 flex items-center justify-center bg-white/90 backdrop-blur-md rounded-2xl shadow-xl active:scale-95 transition-all text-on-surface">
<span class="material-symbols-outlined">layers</span>
</button>
</div>
<!-- Bottom Sheet Tracking Info -->
<div class="pointer-events-auto bg-white rounded-t-[3rem] shadow-[0_-20px_50px_rgba(11,28,48,0.15)] px-8 pt-4 pb-12 transition-transform">
<!-- Drag Handle -->
<div class="w-12 h-1.5 bg-slate-200 mx-auto rounded-full mb-8"></div>
<div class="flex flex-col gap-8">
<!-- Status & Identification -->
<div class="flex justify-between items-start">
<div class="space-y-1">
<div class="flex items-center gap-2">
<span class="px-3 py-1 bg-brand-navy text-brand-yellow text-[10px] font-bold font-label rounded-full tracking-widest uppercase">On Bus</span>
<span class="text-sm text-on-surface-variant font-medium">8 mins away</span>
</div>
<h2 class="font-headline font-extrabold text-2xl tracking-tight text-brand-navy">First is on the bus</h2>
</div>
<div class="bg-surface-container-low px-3 py-2 rounded-xl border border-outline-variant/20">
<span class="text-[10px] font-bold text-outline uppercase block mb-0.5">License Plate</span>
<span class="font-mono text-sm font-bold text-brand-navy tracking-widest">UAH 999R</span>
</div>
</div>

<div class="grid grid-cols-12 gap-4">

<div class="absolute -bottom-1 -right-1 bg-brand-yellow w-4 h-4 rounded-full border-2 border-brand-navy"></div>
</div>
<div class="overflow-hidden">
<p class="text-[10px] font-bold text-white/60 uppercase tracking-tighter">Verified Driver</p>
<h3 class="font-headline font-bold text-white truncate">Marcus Thompson</h3>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-brand-yellow text-xs" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-xs font-bold text-white/80">4.9</span>
</div>
</div>
</div>
<!-- Actions -->
<div class="col-span-4 flex flex-col gap-3">
<button class="flex-1 bg-brand-navy text-brand-yellow rounded-[1.5rem] flex items-center justify-center shadow-lg active:scale-95 transition-all">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">call</span>
</button>
<button class="flex-1 bg-brand-yellow text-brand-navy rounded-[1.5rem] flex items-center justify-center active:scale-95 transition-all">
<span class="material-symbols-outlined text-2xl">chat_bubble</span>
</button>
</div>
</div>
<!-- Trip Progress -->
<div class="relative bg-surface-container-low/50 p-6 rounded-[2rem] border border-outline-variant/10">
<div class="flex justify-between items-center mb-4">
<span class="text-xs font-bold text-on-surface-variant">Current Route: Blue Line B</span>
<span class="text-xs font-medium text-brand-navy">View Full Route</span>
</div>
<div class="relative h-2 bg-surface-container rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full w-[65%] bg-brand-navy rounded-full"></div>
</div>
<div class="flex justify-between mt-3">
<div class="flex flex-col">
<span class="text-[10px] font-bold text-outline uppercase">Next Stop</span>
<span class="text-sm font-bold text-brand-navy">Oak Ridge Park</span>
</div>
<div class="flex flex-col text-right">
<span class="text-[10px] font-bold text-outline uppercase">ETA Home</span>
<span class="text-sm font-bold text-brand-navy">04:15 PM</span>
</div>
</div>
</div>
</div>
</div>
</div>

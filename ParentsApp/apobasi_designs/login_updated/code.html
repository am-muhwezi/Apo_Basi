        darkMode: "class",
        theme: {
          extend: {

              "surface-dim": "#cbdbf5",

              "secondary-fixed": "#ffe083",
              "on-secondary": "#231b00",
              "tertiary-container": "#007d55",
              "primary-container": "#003066",
              "surface-container-low": "#eff4ff",
              "inverse-on-surface": "#eaf1ff",
              "tertiary-fixed": "#6ffbbe",
              "on-tertiary-fixed-variant": "#005236",
              "error": "#ba1a1a",
              "surface-container": "#e5eeff",
              "surface-container-highest": "#d3e4fe",
              "primary": "#003282",
              "on-tertiary": "#ffffff",
              "on-surface-variant": "#434655",
              "outline": "#737686",

              "on-tertiary-fixed": "#002113",
              "on-secondary-container": "#574500",

              "surface": "#f8f9ff",
              "on-secondary-fixed": "#231b00",
              "primary-fixed": "#dbe1ff",
              "primary-fixed-dim": "#b4c5ff",
              "on-primary-container": "#d6e2ff",
              "outline-variant": "#c3c6d7",
              "inverse-surface": "#213145",
              "surface-tint": "#0053db",
              "on-error-container": "#93000a",
              "on-background": "#0b1c30",
              "surface-variant": "#d3e4fe",
              "on-secondary-fixed-variant": "#574500",
              "on-tertiary-container": "#bdffdb",
              "on-primary": "#ffffff",
              "inverse-primary": "#b4c5ff",
              "surface-bright": "#f8f9ff",
              "on-primary-fixed": "#00174b",
              "secondary-fixed-dim": "#eec200",
              "tertiary": "#006242",
              "surface-container-high": "#dce9ff",
              "surface-container-lowest": "#ffffff",
              "secondary-container": "#fed01b"

            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},

      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hero-gradient {
            background: linear-gradient(135deg, #003282 0%, #001b3d 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- Hero Section -->
<header class="hero-gradient pt-20 pb-32 px-8 relative overflow-hidden flex flex-col items-center justify-center text-center">
<!-- Decorative elements inspired by logo colors -->
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-secondary opacity-10 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-20%] left-[-5%] w-80 h-80 bg-primary opacity-20 rounded-full blur-3xl"></div>
<!-- Logo Cluster -->
<div class="relative z-10 flex flex-col items-center space-y-4">
<div class="w-32 h-32 bg-white/10 rounded-3xl p-1 backdrop-blur-sm border border-white/20">
<img alt="ApoBasi Logo" class="w-full h-full object-contain rounded-2xl shadow-2xl" src="https://lh3.googleusercontent.com/aida/ADBb0ug08n8kOGM91U8Y0JWmQLiJziIIrgpDOnHHCOniY1zM6MMjSO-5m7s5x2ZoWdYnvPBHUVrCVHq_Nq5H0CeeuYFd4BCJtu27SItB1JMXtKdZL-eM_dK4gMYHTHorRJyxsTHtqvIDkK3diwBhEhyhDOCz_OQ3qLQSGxyJBZ2YC5YR5I5nwTyZYF2Wc0H-np1wT4VwHZT4P35S87bgSExoz2yr_SrvVgsH6m32QtI10X8ehxFcXrkeuWohspERbTtYbD2XgVC1UN973Cg"/>
</div>
<div class="space-y-1">
<h1 class="font-headline font-extrabold text-4xl tracking-tight text-white">ApoBasi</h1>
<p class="font-body text-secondary font-medium text-lg opacity-100">Safe journeys, Happy parents</p>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center px-6 -mt-16 relative z-20">
<div class="w-full max-w-md bg-surface-container-lowest rounded-3xl p-8 shadow-[0_32px_64px_rgba(0,27,61,0.12)] border border-outline-variant/10">
<form class="space-y-8">
<div class="space-y-2">
<label class="font-headline font-bold text-on-surface-variant text-sm ml-1" for="email">Parental Email</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 focus:ring-2 focus:ring-secondary/50 rounded-xl px-4 py-4 text-on-surface font-body transition-all placeholder:text-outline" id="email" placeholder="e.g. parent@example.com" type="email"/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none opacity-40">
<span class="material-symbols-outlined text-primary">mail</span>
</div>
</div>
</div>
<button class="w-full bg-secondary hover:bg-secondary/90 text-on-secondary font-headline font-bold py-4 rounded-xl shadow-lg shadow-secondary/20 active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
<span>Send Login Link</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<div class="mt-10 flex flex-col items-center space-y-6">
<div class="flex items-center w-full space-x-4">
<div class="h-[1px] bg-outline-variant/30 flex-grow"></div>
<span class="text-xs font-label text-outline uppercase tracking-widest font-semibold">Trust &amp; Safety</span>
<div class="h-[1px] bg-outline-variant/30 flex-grow"></div>
</div>
<p class="text-center text-sm text-on-surface-variant leading-relaxed px-4">
                    We'll send a secure, one-time access link to your inbox. No passwords required.
                </p>
</div>
</div>
<!-- Secondary Action -->
<div class="mt-8">
<button class="flex items-center space-x-2 text-primary font-label font-bold hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-lg">help</span>
<span>Having trouble logging in?</span>
</button>
</div>
</main>
<!-- Footer -->
<footer class="mt-auto py-10 px-8 flex flex-col items-center space-y-4">
<div class="flex items-center space-x-6 text-outline text-sm font-label">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
</div>
<p class="text-outline/60 text-xs font-label tracking-wider">
            © 2024 ApoBasi. All rights reserved.
        </p>
</footer>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-4xl aspect-square opacity-[0.03]">
<img alt="Abstract subtle geometric pattern" class="w-full h-full object-cover grayscale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBVK5BTSRuQGQoonw_JQyZmuwz6H3g0n30I5iQGZ-APN1QT9b-vkm1yq0pfWVQsXCKp9xWox2uYJXiT1QtnD28nSkPNOCYE6sKHdUJLbALcqfkiddDymw7UPe6KWSAx6nAF1o3Bm1TlqPs1VEKUAM_YZYzdEJQrQwAHkIJ3HjcKikdVP03EypQIZeU5tcjijT-jhoUQBMd7lS993as3r2tzOwj9-ypwxydNu6qcoq0X38BWhgQJfCXccDkrWJcDFlo_HAbP7Ugt8Fvg"/>
</div>
</div>
</body></html>
